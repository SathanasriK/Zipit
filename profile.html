<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ZipIt</title>
    <meta name="description" content="Manage your ZipIt profile">
    
    <!-- External Libraries -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- App Theme -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Profile Styles -->
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1>My Profile</h1>
        </div>
        
        <div id="profile-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
    <script>
        // Back-to-dashboard: instant navigation with a slide-out visual on this page only.
        (function(){
            const back = document.querySelector('.back-link');
            if (!back) return;
            back.addEventListener('click', (e) => {
                e.preventDefault();
                // Remove any loading elements on this page immediately
                document.querySelectorAll('.loading, .spinner').forEach(el => el.remove());

                // Add a slide-out class to body to give a visual cue (does not delay navigation)
                document.body.classList.add('profile-slide-out');

                // Navigate instantly to dashboard route (index with dashboard fragment)
                // No async waits, no loaders — instant navigation
                window.location.href = 'index.html#dashboard';
            });
        })();
    </script>
</body>
</html>
